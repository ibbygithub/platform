openapi: 3.1.0
info:
  title: Platform LLM Gateway
  version: 0.2.0
  description: |
    Unified access to multiple LLM providers (OpenAI, Google Gemini, Anthropic)
    through a single internal endpoint. Use this for all AI completions and
    embeddings — never call provider APIs directly.

    Provider routing:
      - Specify "provider" in the request body to select a provider explicitly
      - Omit "provider" to use the server default (DEFAULT_CHAT_PROVIDER /
        DEFAULT_EMBED_PROVIDER — typically google/gemini-2.0-flash for chat,
        openai/text-embedding-3-small for embeddings)

    Auth: No inbound authentication — open on platform_net and via Traefik.
    Provider API keys live server-side on svcnode-01.

    Observability gap: app.py has no Loki push code. Token usage and cost
    cannot currently be monitored from Grafana. Tracked as a known gap.

servers:
  - url: https://llm.platform.ibbytech.com
    description: Traefik FQDN (primary)
  - url: http://platform-llm-gateway:8080
    description: Internal platform_net (use from other containers on svcnode-01)
  - url: http://192.168.71.220
    description: Direct IP fallback (LAN only, use if DNS fails)

paths:

  /health:
    get:
      summary: Health check
      description: |
        Reports which provider API keys are configured server-side.
        Use this to confirm which providers are available before routing requests.
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/embeddings:
    post:
      summary: Generate text embeddings
      description: |
        Generate vector embeddings for one or more input texts.
        Supported providers: openai, google (anthropic has no embeddings API).

        Default provider and model are configured server-side via env vars:
          DEFAULT_EMBED_PROVIDER (default: openai)
          DEFAULT_EMBED_MODEL    (default: text-embedding-3-small, 1536 dimensions)

        Google embeddings model reference:
          text-embedding-004 — 768 dimensions
          embedding-001      — 768 dimensions
      operationId: embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingsRequest"
            examples:
              single_text:
                summary: Single text (default provider)
                value:
                  input: ["Tokyo ramen restaurant authentic local"]
              batch_texts:
                summary: Batch of texts (explicit openai provider)
                value:
                  provider: "openai"
                  model: "text-embedding-3-small"
                  input:
                    - "Ichiran ramen Shinjuku"
                    - "Fuunji tsukemen Shinjuku"
                    - "Ippudo tonkotsu ramen"
              google_embeddings:
                summary: Google embeddings
                value:
                  provider: "google"
                  model: "text-embedding-004"
                  input: ["platform validation test"]
      responses:
        "200":
          description: Embedding vectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsResponse"
        "400":
          description: Invalid request (e.g. anthropic provider specified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Provider API key not configured on server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream provider API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chat:
    post:
      summary: Chat completion
      description: |
        Generate a chat completion. Supports multi-turn conversations via the
        messages array. Supported providers: openai, google, anthropic.

        Default provider and model are configured server-side via env vars:
          DEFAULT_CHAT_PROVIDER (default: google)
          DEFAULT_CHAT_MODEL    (default: gemini-2.0-flash)

        Provider-specific notes:
          openai:    standard messages format (system/user/assistant)
          google:    system messages extracted to systemInstruction; others
                     are joined and sent as a single user turn
          anthropic: system messages extracted to system param; multi-turn
                     chat_messages sent as-is (no system role in messages)
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              default_provider:
                summary: Use default provider (no provider specified)
                value:
                  messages:
                    - role: user
                      content: "Summarize the top 3 ramen shops in Tokyo."
                  max_output_tokens: 500
              explicit_google:
                summary: Explicitly route to Google Gemini
                value:
                  provider: google
                  model: gemini-2.0-flash
                  messages:
                    - role: system
                      content: "You are a helpful travel assistant."
                    - role: user
                      content: "What should I eat in Osaka?"
                  temperature: 0.3
                  max_output_tokens: 300
              explicit_openai:
                summary: Route to OpenAI GPT-4o
                value:
                  provider: openai
                  model: gpt-4o
                  messages:
                    - role: user
                      content: "List 5 must-visit izakayas in Shinjuku."
                  max_output_tokens: 400
              explicit_anthropic:
                summary: Route to Anthropic Claude
                value:
                  provider: anthropic
                  model: claude-sonnet-4-6
                  messages:
                    - role: user
                      content: "Reply with exactly the word: GATEWAY_OK"
                  max_output_tokens: 20
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Invalid provider or request format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Provider API key not configured on server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream provider API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        time:
          type: integer
          description: Unix timestamp
        providers:
          type: object
          properties:
            openai_key_set:
              type: boolean
            google_key_set:
              type: boolean
            anthropic_key_set:
              type: boolean
        defaults:
          type: object
          properties:
            embed:
              type: object
              properties:
                provider:
                  type: string
                model:
                  type: string
            chat:
              type: object
              properties:
                provider:
                  type: string
                model:
                  type: string

    Provider:
      type: string
      enum: [openai, google, anthropic]

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    EmbeddingsRequest:
      type: object
      required: [input]
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
          description: "Defaults to DEFAULT_EMBED_PROVIDER (openai). Anthropic not supported."
        model:
          type: string
          description: "Defaults to DEFAULT_EMBED_MODEL (text-embedding-3-small)."
          examples:
            - "text-embedding-3-small"
            - "text-embedding-3-large"
            - "text-embedding-004"
        input:
          type: array
          items:
            type: string
          minItems: 1
          description: List of texts to embed. Each text is embedded independently.
        metadata:
          type: object
          nullable: true
          description: Passed through for logging — not sent to provider

    EmbeddingsResponse:
      type: object
      required: [provider, model, vectors, usage]
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
        model:
          type: string
        vectors:
          type: array
          items:
            type: array
            items:
              type: number
          description: |
            One vector per input text, in order.
            openai text-embedding-3-small: 1536 dimensions
            google text-embedding-004:     768 dimensions
        usage:
          type: object
          description: Token usage from the provider (shape varies by provider)

    ChatRequest:
      type: object
      required: [messages]
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
          description: "Defaults to DEFAULT_CHAT_PROVIDER (google)."
        model:
          type: string
          description: "Defaults to DEFAULT_CHAT_MODEL (gemini-2.0-flash)."
          examples:
            - "gemini-2.0-flash"
            - "gpt-4o"
            - "gpt-4o-mini"
            - "claude-sonnet-4-6"
            - "claude-haiku-4-5-20251001"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
          description: |
            Conversation history. Use system role for instructions.
            Note: Google and Anthropic providers handle system messages
            differently — see endpoint description.
        temperature:
          type: number
          minimum: 0.0
          maximum: 2.0
          default: 0.2
          description: Sampling temperature. Lower = more deterministic.
        max_output_tokens:
          type: integer
          default: 1024
          description: Maximum tokens in the response
        metadata:
          type: object
          nullable: true
          description: Passed through for logging — not sent to provider

    ChatResponse:
      type: object
      required: [provider, model, output_text, usage]
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
        model:
          type: string
        output_text:
          type: string
          description: The model's response text
        usage:
          type: object
          description: |
            Token usage from the provider.
            openai:    {prompt_tokens, completion_tokens, total_tokens}
            google:    {promptTokenCount, candidatesTokenCount, totalTokenCount}
            anthropic: {input_tokens, output_tokens}

    ErrorResponse:
      type: object
      properties:
        detail:
          description: Error message or structured error object from provider
