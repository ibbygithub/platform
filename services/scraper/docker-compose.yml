# Scraper service — platform wrapper API around Firecrawl
#
# Firecrawl is managed separately at /opt/firecrawl on svcnode-01.
# Start Firecrawl first:
#   cd /opt/firecrawl && docker compose up -d
#
# This compose only runs scraper-api, which calls Firecrawl on the host
# via host.docker.internal (port 3002).

networks:
  platform_net:
    external: true
    name: platform_net

services:

  # ── Platform wrapper API ───────────────────────────────────────────────────
  scraper-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: platform-scraper-api
    container_name: platform-scraper-api
    ports:
      - "0.0.0.0:8083:8083"
    restart: unless-stopped

    environment:
      # Firecrawl — override to reach host-level Firecrawl from inside Docker
      - FIRECRAWL_API_URL=http://host.docker.internal:3002
      # LLM Gateway — container name on platform_net
      - LLM_GATEWAY_URL=http://platform-llm-gateway:8080
      # Loki — centralized log aggregation (svcnode-01 internal)
      - LOKI_URL=http://192.168.71.220:3100

    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "dbnode-01:192.168.71.221"

    env_file:
      - ./.env

    networks:
      - platform_net

    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_net

      - traefik.http.routers.scraper-http.entrypoints=web
      - traefik.http.routers.scraper-http.rule=Host(`scrape.platform.ibbytech.com`)
      - traefik.http.routers.scraper-http.service=scraper
      - traefik.http.services.scraper.loadbalancer.server.port=8083

      - traefik.http.routers.scraper-https.entrypoints=websecure
      - traefik.http.routers.scraper-https.rule=Host(`scrape.platform.ibbytech.com`)
      - traefik.http.routers.scraper-https.service=scraper
      - traefik.http.routers.scraper-https.tls=true
