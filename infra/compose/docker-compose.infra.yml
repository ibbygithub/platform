# Platform infrastructure layer
# Laptop recovery mode (2026-03-15): Traefik replaced with direct-port services.
# Postgres moved here from dbnode-01 (was bare metal → now container).
#
# Usage (laptop):
#   cd C:\git\work\platform\infra\compose
#   docker compose -f docker-compose.infra.yml up -d
#
# Requires .env in this directory with:
#   POSTGRES_PASSWORD=<value>
#   TUNNEL_TOKEN=<value from Cloudflare Zero Trust → Tunnels → shogun-laptop>
#
# NOTE: Traefik config preserved below (commented). Restore when lab is rebuilt.

networks:
  platform_net:
    name: platform_net
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"    # Localhost only — admin access from laptop
    networks:
      - platform_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: platform-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - platform_net
    depends_on:
      - postgres

volumes:
  postgres_data:
    name: platform-postgres-data

