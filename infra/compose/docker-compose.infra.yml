# Platform infrastructure layer
# Start this first — it creates platform_net which all services join.
#
# Usage (on svcnode-01):
#   cd /opt/git/work/platform/infra/compose
#   docker compose -f docker-compose.infra.yml up -d

networks:
  platform_net:
    name: platform_net
    driver: bridge

services:
  traefik:
    image: traefik:v3.6.7
    container_name: platform-traefik
    restart: unless-stopped

    environment:
      - DOCKER_API_VERSION=1.44

    command:
      - --log.level=INFO

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.traefik.address=:8080

      # Dashboard
      - --api.dashboard=true

      # Docker provider — only expose containers with traefik.enable=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.network=platform_net

      # File provider for TLS certs
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"   # Dashboard — localhost only

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/certs:ro

    networks:
      - platform_net

    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-http.entrypoints=web
      - traefik.http.routers.traefik-http.rule=Host(`traefik.platform.ibbytech.com`)
      - traefik.http.routers.traefik-http.service=api@internal
      - traefik.http.routers.traefik-https.entrypoints=websecure
      - traefik.http.routers.traefik-https.rule=Host(`traefik.platform.ibbytech.com`)
      - traefik.http.routers.traefik-https.service=api@internal
      - traefik.http.routers.traefik-https.tls=true
